description: >-
  FinOps view of Tive spend. Tive is an enterprise, sales-led offering that
  bundles cellular IoT trackers (hardware), a real-time visibility platform
  (software subscription including Public API and webhook access), and optional
  managed monitoring services. Costs are governed by negotiated contracts driven
  by tracker volume (reusable vs. single-use), shipment lanes, monitoring service
  level, and contract term rather than by usage-metered API pricing. No public
  per-call or per-token API rates were found; cost meters below are modeled at the
  contract/asset level and are not reconciled.
notes: >-
  Tive does not publish usage-based API pricing. Validate the actual contract
  structure, tracker cost model (reusable vs. single-use), and any platform/API
  usage tiers with Tive sales during reconciliation.
