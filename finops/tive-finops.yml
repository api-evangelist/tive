meters:
- name: platform_subscription
  description: Annual platform/API subscription granting access to the visibility platform, Public API (v3), and webhooks.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - term
- name: trackers
  description: Cellular IoT trackers procured, billed per device and varying by reusable vs. single-use and volume.
  unit: devices
  aggregation: sum
  dimensions:
  - account
  - device_type
- name: monitoring_service
  description: Optional 24/7 managed monitoring service, billed per contract.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - service_level
principles:
- name: Visibility
  description: Track tracker inventory, active shipment counts, and contract line items against the negotiated Tive agreement.
- name: Allocation
  description: Tag trackers and shipment lanes to internal cost centers and business units.
- name: Optimization
  description: Right-size device mix (reusable vs. single-use) per lane and reclaim/reuse trackers to reduce per-shipment hardware cost.
- name: Accountability
  description: Assign owners per lane/program and review tracker utilization and monitoring spend against budget.
